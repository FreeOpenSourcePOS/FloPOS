<ion-view view-title="{{'Unpaid Orders'}}">
    <ion-content>
        <div class="im-wrapper">

            <!-- Search Form -->
            <form>
            <h4 class="border-top"><i class="icon ion-search"></i> {{'Select Period'}}</h4>
            <div class="list">
                <label class="item item-input item-floating-label">
                  <span class="input-label">{{'Starting Period'}}</span>
                  <input type="datetime-local" placeholder="{{'Day'}}" name="startdate" ng-model="startdate" required>
                </label>
                <label class="item item-input item-floating-label">
                  <span class="input-label">{{'Ending Period'}}</span>
                  <input type="datetime-local" placeholder="{{'Day'}}" name="enddate" ng-model="enddate" required>
                </label>
                <button class="button button-block button-calm ink" data-ink-color="#9DEAFF" data-ink-opacity="1" ng-click="doRefresh(startdate, enddate)">
                  {{'Search'}}
                </button>
            </div>
            </form>
            <!-- Search Form Ends -->

          <div ng-show="unpaid.status">
            <div class="list card stable-bg">
            <div class="item item-body">
              <table class="item" width="80%" border='1'>
                  <tr>
                      <th>Start Date</th><td> {{unpaid.startdate}}</td>
                  </tr>
                  <tr>
                      <th>End Date</th><td> {{unpaid.enddate}}</td>
                  </tr>
                  <tr>
                      <th>Total Unpaid Orders</th><td> {{ totalUnpaid }}</td>
                  </tr>
              </table>
            </div>
            </div>
          </div>
          <span ng-repeat="o in unpaid.orders" ng-show="unpaid.status">
            <div class="list card" ng-click="openBillModal(o)">
                <div class="item item-avatar">
                    <img src="img/menu_discounts.png">
                    <h2>{{o.customer}}</h2>
                    <p>Total Bill :  {{o.totalBill}}<br>{{o.orderDateTime}}</p>
                    <p>Employee: {{o.cashier}}</p>
                </div>
            </div>
          </span>

        <script id="bill-modal.html" type="text/ng-template">
            <ion-modal-view>
                <ion-header-bar>
                    <h1 class="title">Detailed Bill</h1>
                </ion-header-bar>
                <ion-content class="padding">
                    <h4><center>{{bill.customer}}</center></h4>
                    <center> {{bill.tableNo}} <br/> {{bill.orderDateTime}} </center>
                    <table width="100%">
                      <tr>
                        <th><b>Item</b></th>
                        <th><b>Quantity</b></th>
                        <th><b>Rate</b></th>
                        <th><b>Amount</b></th>
                      </tr>
                      <tr ng-repeat="oi in bill.orderItems" >
                        <td data-th="Item">{{oi.itemName}}</td>
                        <td data-th="Quantity">{{oi.quantity}}</td>
                        <td data-th="Rate">{{(oi.rateAfterDiscount/oi.quantity | number:2)*1 }}</td>
                        <td data-th="Amount">{{oi.rateAfterDiscount}}</td>
                      </tr>
                    </table>
                      <center> Cashier: {{bill.cashier}} </center>

                <button class="button button-block button-warm ink" data-ink-opacity="1" ng-click="closeBillModal()">
                  {{'Close'}}
                </button>
                </ion-content>
            </ion-modal-view>
        </script>

        </div>
    </ion-content>
</ion-view>
