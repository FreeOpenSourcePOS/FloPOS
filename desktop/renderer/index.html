<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:*">
  <title>FloPos - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0078D7 0%, #005A9E 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
    }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    p { font-size: 1.2rem; opacity: 0.9; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>FloPos</h1>
    <p>Self-hosted Point of Sale System</p>
    <div class="spinner"></div>
    <p>Loading application...</p>
    <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">
      Your data stays on your device.
    </p>
  </div>
  <script>
    // Redirect to the web admin interface if available
    const localIP = 'localhost';
    const port = 3001;
    
    fetch(`http://${localIP}:${port}/api/health`)
      .then(r => r.json())
      .then(() => {
        window.location.href = `http://${localIP}:${port}`;
      })
      .catch(() => {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelectorAll('p')[1].textContent = 'Server starting...';
      });
  </script>
</body>
</html>
